name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: patchpilot
          POSTGRES_PASSWORD: patchpilot
          POSTGRES_DB: patchpilot_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install deps
        run: cd backend && pip install -e ".[dev]"

      - name: Lint (ruff)
        run: cd backend && ruff check . && ruff format --check .

      - name: Type check (mypy)
        run: cd backend && mypy app

      - name: Test (pytest)
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://patchpilot:patchpilot@localhost:5432/patchpilot_test
          MASTER_KEY: ${{ secrets.TEST_MASTER_KEY }}
          REDIS_URL: redis://localhost:6379/0
        run: cd backend && pytest tests/ -v --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: cd frontend && npm ci

      - name: Type check + build (tsc + vite)
        run: cd frontend && npm run build

      - name: Unit tests (vitest)
        run: cd frontend && npm test -- --run
