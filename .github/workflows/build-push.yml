name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write   # needed for cosign keyless signing

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: backend
            dockerfile: backend/Dockerfile
            image: patchpilot-backend
          - context: backend
            dockerfile: backend/Dockerfile.worker
            image: patchpilot-worker
          - context: frontend
            dockerfile: frontend/Dockerfile
            image: patchpilot-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless OIDC)
        # Image reference uses the digest to avoid tag mutability races
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: cosign sign --yes "${IMAGE_REPO}@${IMAGE_DIGEST}"
