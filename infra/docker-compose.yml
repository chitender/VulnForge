version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: patchpilot
      POSTGRES_PASSWORD: patchpilot
      POSTGRES_DB: patchpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patchpilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  trivy-server:
    image: aquasec/trivy:latest
    command: server --listen 0.0.0.0:4954 --cache-dir /trivy-cache
    ports:
      - "4954:4954"
    volumes:
      - trivy_cache:/trivy-cache
    environment:
      TRIVY_LISTEN: "0.0.0.0:4954"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/realms/master || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://patchpilot:patchpilot@postgres:5432/patchpilot
      REDIS_URL: redis://redis:6379/0
      TRIVY_SERVER_URL: http://trivy-server:4954
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://patchpilot:patchpilot@postgres:5432/patchpilot
      REDIS_URL: redis://redis:6379/0
      TRIVY_SERVER_URL: http://trivy-server:4954
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: patchpilot
      VITE_KEYCLOAK_CLIENT_ID: patchpilot-frontend
      VITE_API_URL: http://localhost:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  trivy_cache:
