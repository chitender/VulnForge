global:
  image:
    registry: ghcr.io
    org: your-org      # replace with your GitHub org/username
    tag: latest
    pullPolicy: IfNotPresent

# ── PatchPilot services ──────────────────────────────────────────────────────

backend:
  replicaCount: 2
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits:   { cpu: 1,    memory: 512Mi }
  service:
    port: 8000

worker:
  concurrency: 2
  resources:
    requests:
      cpu: "1"
      memory: 512Mi
      ephemeral-storage: 4Gi
    limits:
      cpu: "2"
      memory: 2Gi
      ephemeral-storage: 8Gi
  keda:
    minReplicas: 2
    maxReplicas: 50
    listLength: 2

trivyServer:
  replicas: 2
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    cpuTargetPercent: 60

frontend:
  replicaCount: 2
  service:
    port: 80

ingress:
  enabled: true
  host: patchpilot.example.com
  tls: true
  tlsSecretName: patchpilot-tls
  annotations: {}

# Keycloak realm / OIDC config
config:
  keycloakRealm: patchpilot
  keycloakClientId: patchpilot-backend

# MASTER_KEY for envelope encryption — must be set at deploy time
# Generate: python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
masterKey: ""   # set via --set masterKey=<key> or values override

# ── Bundled subchart: PostgreSQL (Bitnami) ───────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: patchpilot
    password: ""      # REQUIRED — set via --set postgresql.auth.password=<strong-password>
    database: patchpilot
  primary:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests: { cpu: 250m, memory: 256Mi }
      limits:   { cpu: 1,    memory: 512Mi }

# ── Bundled subchart: Redis (Bitnami) ────────────────────────────────────────
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 256Mi }

# ── Bundled subchart: Keycloak (Bitnami) ─────────────────────────────────────
keycloak:
  enabled: true
  auth:
    adminUser: admin
    adminPassword: ""   # REQUIRED — set via --set keycloak.auth.adminPassword=<strong-password>
  # Bootstrap admin account created in the patchpilot realm (temporary=true,
  # operator must change password on first login).
  # REQUIRED — set via --set keycloak.bootstrapAdminPassword=<password>
  bootstrapAdminPassword: ""
  extraStartupArgs: "--import-realm"
  extraVolumes:
    - name: realm-config
      configMap:
        name: patchpilot-keycloak-realm
  extraVolumeMounts:
    - name: realm-config
      mountPath: /opt/bitnami/keycloak/data/import
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits:   { cpu: 2,    memory: 1Gi }
