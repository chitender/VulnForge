apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "patchpilot.fullname" . }}-backend
  labels: {{ include "patchpilot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "patchpilot.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "patchpilot.fullname" . }}-backend
        {{ include "patchpilot.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: {{ .Values.global.image.registry }}/{{ .Values.global.image.org }}/patchpilot-backend:{{ .Values.global.image.tag }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "patchpilot.fullname" . }}-config
          env:
            - name: MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.masterKey.secretName }}
                  key: {{ .Values.externalSecrets.masterKey.secretKey }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.databaseUrl.secretName }}
                  key: {{ .Values.externalSecrets.databaseUrl.secretKey }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources: {{ .Values.backend.resources | toYaml | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "patchpilot.fullname" . }}-backend
  labels: {{ include "patchpilot.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "patchpilot.fullname" . }}-backend
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
