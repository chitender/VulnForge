apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "patchpilot.fullname" . }}-migrate-{{ .Release.Revision }}
  labels: {{ include "patchpilot.labels" . | nindent 4 }}
  annotations:
    # Run this Job on every helm install/upgrade, then clean up after success
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ include "patchpilot.fullname" . }}-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ .Values.global.image.registry }}/{{ .Values.global.image.org }}/patchpilot-backend:{{ .Values.global.image.tag }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              value: {{ include "patchpilot.databaseUrl" . | quote }}
            - name: MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "patchpilot.fullname" . }}-master-key
                  key: master-key
          envFrom:
            - configMapRef:
                name: {{ include "patchpilot.fullname" . }}-config
