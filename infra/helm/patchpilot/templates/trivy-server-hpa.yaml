{{- if .Values.trivyServer.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "patchpilot.fullname" . }}-trivy-server
  labels: {{ include "patchpilot.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "patchpilot.fullname" . }}-trivy-server
  minReplicas: {{ .Values.trivyServer.hpa.minReplicas }}
  maxReplicas: {{ .Values.trivyServer.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.trivyServer.hpa.cpuTargetPercent }}
{{- end }}
