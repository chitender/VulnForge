apiVersion: v1
kind: Secret
metadata:
  name: {{ include "patchpilot.fullname" . }}-master-key
  labels: {{ include "patchpilot.labels" . | nindent 4 }}
  annotations:
    # Prevent Helm from deleting this secret on upgrade — key rotation is manual
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  master-key: {{ required "masterKey must be set. Generate with: python3 -c \"from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())\"" .Values.masterKey | quote }}
