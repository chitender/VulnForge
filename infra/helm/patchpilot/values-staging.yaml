global:
  image:
    tag: latest

backend:
  replicaCount: 1

worker:
  keda:
    minReplicas: 1
    maxReplicas: 10

trivyServer:
  replicas: 1
  hpa:
    enabled: false

frontend:
  replicaCount: 1

ingress:
  host: patchpilot-staging.example.com
  tls: false

postgresql:
  primary:
    persistence:
      size: 4Gi
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 256Mi }

redis:
  master:
    persistence:
      size: 1Gi

keycloak:
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits:   { cpu: 1,    memory: 512Mi }
